<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PM Tool - Board</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: block; height: auto; background: #f5f6fa; min-height: 100vh; }
    .board-container { max-width: 1100px; margin: 0 auto; padding: 35px 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .top-bar a { color: #667eea; text-decoration: none; font-size: 14px; font-weight: 600; }
    .top-bar a:hover { text-decoration: underline; }
    .top-bar h2 { color: #1a1a2e; font-size: 24px; font-weight: 700; }

    .create-task-form { background: white; padding: 18px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 28px; display: flex; gap: 10px; }
    .create-task-form input { flex: 1; padding: 12px 14px; border: 1.5px solid #e2e2ea; border-radius: 8px; font-size: 14px; }
    .create-task-form input:focus { outline: none; border-color: #667eea; }
    .create-task-form button { background: #667eea; color: white; border: none; padding: 12px 22px; border-radius: 8px; cursor: pointer; font-weight: 600; white-space: nowrap; transition: background 0.2s; }
    .create-task-form button:hover { background: #5568d3; }

    .board-columns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
    .column { background: #ececf4; border-radius: 14px; padding: 14px; min-height: 420px; }
    .column h3 { margin-bottom: 14px; color: #555; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }

    .task-card { background: white; padding: 14px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .task-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
    .task-card h4 { font-size: 14px; color: #1a1a2e; margin-bottom: 5px; }
    .task-card p { font-size: 12px; color: #888; }
    .task-card .assigned-badge { font-size: 11px; color: #667eea; font-weight: 600; margin-top: 6px; }

    .task-status-buttons { display: flex; gap: 5px; margin-top: 10px; }
    .task-status-buttons button { font-size: 11px; padding: 5px 9px; border: 1.5px solid #e2e2ea; background: white; border-radius: 6px; cursor: pointer; font-weight: 600; color: #555; transition: all 0.15s; }
    .task-status-buttons button:hover { background: #667eea; color: white; border-color: #667eea; }

    .comment-item { background: #f5f5f7; padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; }
    .comment-item .comment-author { font-weight: 700; color: #667eea; font-size: 12px; }
    .comment-item .comment-text { color: #333; margin-top: 3px; }

    .modal-overlay input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
    .modal-overlay button { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    .member-item { background: #f5f5f7; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }

    select#assignSelect { width: 100%; padding: 8px; border: 1.5px solid #e2e2ea; border-radius: 6px; margin-bottom: 15px; font-size: 13px; }
  </style>
</head>
<body>

  <div class="board-container">
    <div class="top-bar">
      <a href="dashboard.html">← Back to Projects</a>
      <h2 id="projectName">Project Board</h2>
      <button onclick="openMembersModal()" style="background:#667eea; color:white; border:none; padding:9px 16px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px;">+ Add Member</button>
    </div>

    <div class="create-task-form">
      <input type="text" id="taskTitle" placeholder="Task title">
      <input type="text" id="taskDescription" placeholder="Description (optional)">
      <button onclick="createTask()">+ Add Task</button>
    </div>

    <div class="board-columns">
      <div class="column">
        <h3>To Do</h3>
        <div id="todoColumn"></div>
      </div>
      <div class="column">
        <h3>In Progress</h3>
        <div id="inProgressColumn"></div>
      </div>
      <div class="column">
        <h3>Done</h3>
        <div id="doneColumn"></div>
      </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="taskModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
      <div style="background:white; border-radius:10px; padding:25px; width:450px; max-height:80vh; overflow-y:auto;">
        <h3 id="modalTaskTitle" style="margin-bottom:10px;"></h3>
        <p id="modalTaskDescription" style="color:#666; font-size:13px; margin-bottom:15px;"></p>

        <h4 style="margin-bottom:8px; font-size:14px;">Assign To</h4>
        <select id="assignSelect" onchange="assignTask()">
          <option value="">Unassigned</option>
        </select>

        <h4 style="margin-bottom:10px; font-size:14px;">Comments</h4>
        <div id="commentsList" style="margin-bottom:15px;"></div>

        <div style="display:flex; gap:8px; margin-bottom:15px;">
          <input type="text" id="commentText" placeholder="Add a comment...">
          <button onclick="addComment()">Send</button>
        </div>

        <button onclick="closeModal()" style="background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; width:100%;">Close</button>
      </div>
    </div>

    <!-- Add Member Modal -->
    <div id="membersModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
      <div style="background:white; border-radius:10px; padding:25px; width:400px;">
        <h3 style="margin-bottom:15px;">Add Member</h3>
        <div style="display:flex; gap:8px; margin-bottom:15px;">
          <input type="email" id="memberEmail" placeholder="Member's email">
          <button onclick="addMember()">Add</button>
        </div>
        <p id="memberMessage" style="font-size:13px; margin-bottom:15px;"></p>

        <h4 style="margin-bottom:10px; font-size:14px;">Current Members</h4>
        <div id="membersList" style="margin-bottom:15px;"></div>

        <button onclick="closeMembersModal()" style="background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; width:100%;">Close</button>
      </div>
    </div>
  </div>

  <script src="board.js"></script>
</body>
</html>
